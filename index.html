<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RT48 Player</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
iframe{width:100%;height:100%;border:none;position:absolute;top:0;left:0}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;z-index:10;pointer-events:none}
#input{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:100;background:rgba(0,0,0,0.8);padding:15px;border-radius:8px;display:flex;gap:10px}
input{padding:10px 15px;border:none;border-radius:4px;background:#333;color:#fff;width:250px;font-size:14px}
button{padding:10px 20px;border:none;border-radius:4px;background:#ff0000;color:#fff;cursor:pointer;font-size:14px;font-weight:bold}
.hidden{display:none!important}
</style>
<script>
document.addEventListener('contextmenu',e=>e.preventDefault());
document.addEventListener('keydown',e=>{
  if(e.key==='F12'||(e.ctrlKey&&e.shiftKey&&(e.key==='I'||e.key==='J'))||(e.ctrlKey&&e.key==='u'))e.preventDefault();
});
function loadVideo(){
  const id=document.getElementById('vid').value.trim();
  if(/^[a-zA-Z0-9_-]{11}$/.test(id)){
    document.getElementById('player').src='https://www.youtube.com/embed/'+id+'?autoplay=1&mute=1&rel=0&modestbranding=1&showinfo=0&fs=1&playsinline=1&controls=1';
    document.getElementById('input').classList.add('hidden');
  }else{
    alert('ID YouTube harus 11 karakter! Contoh: dQw4w9WgXcQ');
  }
}
window.onload=function(){
  const urlId=new URLSearchParams(location.search).get('id');
  if(urlId&&/^[a-zA-Z0-9_-]{11}$/.test(urlId)){
    document.getElementById('vid').value=urlId;
    loadVideo();
  }
};
</script>
</head>
<body>
<div id="input">
  <input type="text" id="vid" placeholder="Masukkan YouTube ID (11 karakter)" maxlength="11">
  <button onclick="loadVideo()">▶ PLAY</button>
</div>
<iframe id="player" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen" allowfullscreen></iframe>
<div class="overlay"></div>
</body>
</html>
